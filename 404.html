<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | МастерОк</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="error-page">
        <div class="container">
            <div class="columns is-centered">
                <div class="column is-8">
                    <div class="error-card">
                        <div class="error-icon">
                            <i class="fas fa-tools"></i>
                        </div>
                        <h1 class="error-number">404</h1>
                        <h2 class="title is-2">Упс! Страница не найдена</h2>
                        <p class="subtitle is-5 mb-5">
                            Возможно, эта страница была удалена или перемещена.<br>
                            Но не волнуйтесь, наши мастера всё починят!
                        </p>
                        
                        <div class="search-box">
                            <div class="field has-addons">
                                <div class="control is-expanded">
                                    <input class="input is-medium" type="text" placeholder="Поиск по сайту...">
                                </div>
                                <div class="control">
                                    <a class="button is-primary is-medium">
                                        <span class="icon">
                                            <i class="fas fa-search"></i>
                                        </span>
                                    </a>
                                </div>
                            </div>
                        </div>
                        
                        <div class="buttons is-centered">
                            <a href="index.html" class="button is-primary is-large">
                                <span class="icon">
                                    <i class="fas fa-home"></i>
                                </span>
                                <span>На главную</span>
                            </a>
                            <a href="contacts.html" class="button is-light is-large">
                                <span class="icon">
                                    <i class="fas fa-envelope"></i>
                                </span>
                                <span>Связаться с нами</span>
                            </a>
                        </div>
                        
                        <div class="mt-6">
                            <p class="has-text-grey">Или воспользуйтесь навигацией:</p>
                            <nav class="breadcrumb is-centered" aria-label="breadcrumbs">
                                <ul>
                                    <li><a href="index.html">Главная</a></li>
                                    <li><a href="faq.html">FAQ</a></li>
                                    <li><a href="contacts.html">Контакты</a></li>
                                    <li><a href="index.html#catalog">Каталог</a></li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
